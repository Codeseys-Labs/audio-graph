# Bundled default configuration.
#
# IMPORTANT: only keys that are actually READ at runtime live here. Adding a key
# that nothing consumes reintroduces the dead-config drift tracked as backlog B02.
# Settings the user changes live (theme, diarization models/threshold, graph and
# pipeline tuning) are owned by the settings layer / frontend, not this file.
#
# Consumers (see src/config.rs + src/settings/mod.rs):
#   audio.sample_rate -> settings::configured_sample_rate
#   audio.channels    -> settings::configured_channels
#   asr.model_path    -> settings::configured_whisper_model (filename only)

[audio]
sample_rate = 48000
channels = 2

# Filename only (no directory prefix) — `configured_whisper_model` resolves it
# against the app's models dir. See `asr.model_path` in the consumers list above.
[asr]
model_path = "ggml-small.en.bin"
