asr_provider:
  type: deepgram
  model: nova-3
  enable_diarization: true
  endpointing_ms: 250
  utterance_end_ms: 900
  vad_events: true
  eot_threshold: 0.55
  eager_eot_threshold: 0.15
  eot_timeout_ms: 1100
  max_speakers: 4
whisper_model: ggml-small.en.bin
llm_provider:
  type: openrouter
  model: openai/gpt-5.2
  base_url: https://openrouter.ai/api/v1
  provider_order:
    - openai
  include_usage_in_stream: true
llm_api_config:
  endpoint: https://api.openai.com/v1
  model: gpt-5-mini
  max_tokens: 1024
  temperature: 0.3
audio_settings:
  sample_rate: 44100
  channels: 2
gemini:
  auth:
    type: api_key
  model: gemini-2.0-flash-live-001
  voice: Kore
diarization:
  mode: hybrid
  speaker_count: fixed
  max_speakers: 6
tts_provider:
  type: deepgram_aura
  voice: aura-2-thalia-en
  sample_rate: 24000
  speed: 1.1
speak_aloud: true
streaming_prefill: true
log_level: debug
file_logging: true
log_file_mode: overwrite
demo_mode: false
