# cargo-audit configuration
# https://docs.rs/cargo-audit/latest/cargo_audit/config/index.html
#
# Ignored advisories here are reviewed and accepted — not unknown. Each
# advisory MUST sit under one of the categorized blocks below, and each
# block MUST document the source crate, the blocker, and the unblock
# condition. CI fails the `cargo audit` job on any new finding, forcing a
# fresh review and explicit categorization rather than silent drift.

[advisories]

# When you add an entry, copy `cargo audit`'s "Crate:" + "Title:" lines from
# the failing run into the inline comment so a reviewer can grep for context
# without leaving the file.
ignore = [
    # ── AWS SDK rustls 0.21 chain ────────────────────────────────────
    # Source: transitive via aws-smithy-http-client 1.1.12 → rustls 0.21 →
    # rustls-webpki 0.101.7. Cannot fix independently.
    # Blocker: AWS SDK for Rust is still on rustls 0.21 in its generated
    # smithy runtime. smithy-rs is producing a separate
    # `aws-smithy-http-client-reqwest` crate as a transitional path.
    # Remediation: bump when aws-config / aws-smithy-* ship with rustls
    # >= 0.23. Re-check after each AWS SDK minor bump.
    # Threat model: AudioGraph talks to AWS / Deepgram / AssemblyAI / Gemini
    # over public CA chains and does not parse CRLs, so the affected paths
    # (URI-name constraints, wildcard cert bypasses, CRL parser panic) are
    # not reachable in our deployment.
    "RUSTSEC-2026-0098", # rustls-webpki: name-constraint URI bypass
    "RUSTSEC-2026-0099", # rustls-webpki: wildcard cert handling
    "RUSTSEC-2026-0104", # rustls-webpki: reachable panic in CRL parsing

    # ── Tauri v2 Linux stack: unmaintained gtk-rs / GTK3 bindings ────
    # Source: pulled by Tauri v2's Linux runtime (gtk, gdk, gdkx11, atk,
    # cairo, glib bindings + their -sys / -macros sub-crates).
    # Blocker: Tauri v2 has not yet migrated to GTK4. These are
    # "unmaintained" advisories, not known memory-safety CVEs.
    # Remediation: drop these IDs when Tauri ships GTK4 support.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2024-0429",

    # ── Tauri / mistral.rs / model-loading helpers: unmaintained ─────
    # Source: transitive build/UI helpers — paste, proc-macro-error,
    # number_prefix (progress-display crates), fxhash (selectors /
    # kuchikiki, used by tauri-utils HTML scanning), rust-unic (urlpattern
    # via tauri-utils).
    # Blocker: upstream maintenance, not AudioGraph-owned runtime code.
    # Remediation: drop entries as upstream crates migrate to maintained
    # alternatives.
    "RUSTSEC-2024-0370", # proc-macro-error unmaintained
    "RUSTSEC-2024-0436", # paste unmaintained
    "RUSTSEC-2025-0057", # fxhash unmaintained
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
    "RUSTSEC-2025-0119",

    # ── SurrealDB embedded adapter (gated, non-default, conformance-only) ──
    # Source: transitive via the optional `surrealdb-embedded` feature →
    # surrealdb 3.1.x → rsa 0.9.10 (pulled by surrealdb's RPC/auth stack).
    # Crate: rsa  Title: Marvin Attack — potential key-recovery timing sidechannel.
    # Blocker: no fixed upgrade exists (RustSec lists no patched release); the
    # RSA crate's constant-time work is unreleased.
    # Threat model: `surrealdb-embedded` is OFF by default and never ships in a
    # release build (ADR-0021 keeps FileMemoryRepository the sole default store;
    # SurrealDB is a gated conformance target only, kv-mem in tree). No
    # AudioGraph code path performs RSA private-key operations against attacker-
    # observable timing — the embedded KV engine does not use the RPC/TLS auth
    # surface that rsa serves. So the Marvin timing sidechannel is unreachable
    # in any artifact we ship.
    # Remediation: drop when rsa ships a constant-time release, OR permanently if
    # the SurrealDB-embedded option is closed (seed audio-graph-2b2c decision).
    # NOTE: quinn-proto RUSTSEC-2026-0185 (also surrealdb-transitive) is NOT
    # listed here — it self-resolves: the fix is quinn-proto >=0.11.15 and the
    # gitignored Cargo.lock is regenerated to the latest-compatible on every CI
    # run, which picks 0.11.15. Only add it here if a future pin holds it back.
    "RUSTSEC-2023-0071", # rsa: Marvin Attack (surrealdb-embedded only, no fix)
]
