# AudioGraph CI — Tauri v2 desktop app
# Frontend checks + Rust backend checks per platform
#
# The Tauri backend depends on the rsac crate via `path = "../../rsac"`.
# In CI we checkout audio-graph at `$GITHUB_WORKSPACE/audio-graph` and clone
# rsac at `$GITHUB_WORKSPACE/rsac`, matching the local sibling-checkout layout.

name: AudioGraph CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Pin the parent repo ref so CI is reproducible. Use `master` for bleeding
  # edge; bump to a tag (e.g. `v0.1.0`) once we're cutting releases.
  RSAC_REPO_URL: https://github.com/Codeseys-Labs/rust-crossplat-audio-capture.git
  RSAC_REPO_REF: master
  TAURI_WINDOWS_TEST_MANIFEST: windows-app-manifest.xml

jobs:
  # ── Frontend (fast, platform-independent) ──────────────────────────
  frontend:
    name: Frontend (TypeScript)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run tsc --noEmit
      - name: Vitest
        run: bun run test
      - name: Production build
        run: bun run build

  # ── Rust backend — Linux ───────────────────────────────────────────
  rust-linux:
    name: Rust (Linux)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5
        with:
          path: audio-graph

      - name: Fetch rsac parent (for path dep)
        run: git clone --depth 1 --branch "$RSAC_REPO_REF" "$RSAC_REPO_URL" "$GITHUB_WORKSPACE/rsac"

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: audio-graph/src-tauri

      - name: Install system dependencies
        run: |
          sudo add-apt-repository ppa:pipewire-debian/pipewire-upstream -y
          sudo apt-get update
          sudo apt-get install -y \
            libpipewire-0.3-dev libspa-0.2-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev cmake clang libclang-dev pkg-config xvfb

      - name: Verify rsac path dependency
        working-directory: audio-graph/src-tauri
        run: test -d ../../rsac

      - name: Format check
        working-directory: audio-graph/src-tauri
        run: cargo fmt --check

      - name: Cargo check
        working-directory: audio-graph/src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: audio-graph/src-tauri
        run: xvfb-run -a cargo test -- --test-threads=1

      - name: Cargo audit
        # Hard gate: advisories are either ignored in `.cargo/audit.toml`
        # (with written justification) or must be resolved. Fail on any new
        # finding — that forces a real review rather than silent drift.
        working-directory: audio-graph/src-tauri
        run: |
          cargo install --locked cargo-audit || true
          cargo audit

  # ── Rust backend — macOS ───────────────────────────────────────────
  rust-macos:
    name: Rust (macOS)
    runs-on: blacksmith-6vcpu-macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          path: audio-graph

      - name: Fetch rsac parent (for path dep)
        run: git clone --depth 1 --branch "$RSAC_REPO_REF" "$RSAC_REPO_URL" "$GITHUB_WORKSPACE/rsac"

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: audio-graph/src-tauri

      - name: Install system dependencies
        run: brew install cmake

      - name: Verify rsac path dependency
        working-directory: audio-graph/src-tauri
        run: test -d ../../rsac

      - name: Cargo check
        working-directory: audio-graph/src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: audio-graph/src-tauri
        run: cargo test -- --test-threads=1

  # ── Rust backend — Windows ─────────────────────────────────────────
  rust-windows:
    name: Rust (Windows)
    runs-on: blacksmith-4vcpu-windows-2025
    steps:
      - uses: actions/checkout@v5
        with:
          path: audio-graph

      - name: Fetch rsac parent (for path dep)
        shell: pwsh
        run: git clone --depth 1 --branch $env:RSAC_REPO_REF $env:RSAC_REPO_URL "$env:GITHUB_WORKSPACE\rsac"

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: audio-graph/src-tauri
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install system dependencies
        run: choco install cmake llvm -y

      - name: Verify rsac path dependency
        working-directory: audio-graph/src-tauri
        shell: pwsh
        run: if (-not (Test-Path ..\..\rsac)) { throw "Missing rsac path dependency at ..\..\rsac" }

      - name: Cargo check
        working-directory: audio-graph/src-tauri
        run: cargo check

      - name: Cargo test
        working-directory: audio-graph/src-tauri
        shell: pwsh
        run: |
          $manifest = (Resolve-Path $env:TAURI_WINDOWS_TEST_MANIFEST).Path
          $sep = [char]0x1f
          $env:CARGO_ENCODED_RUSTFLAGS = "-C${sep}link-arg=/MANIFEST:EMBED${sep}-C${sep}link-arg=/MANIFESTINPUT:$manifest"
          cargo test -- --test-threads=1
